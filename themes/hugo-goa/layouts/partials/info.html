
<section id="info-pane" class="row text-center info">
  {{ with .Site.Params.intro }}
  <h3 class="intro">{{ . | markdownify }}</h3>
  {{ end }}
  {{ with .Site.Params.description }}
  <h4 class="description">{{ . | markdownify }}</h4>
  {{ end }}
  <a href="/wc/"><h4><em>📝{{ partial "wc.html" . }} / 1,000,000 human words</em></h4></a>
  {{ with .Site.Params.description2 }}
  <h4 class="description2">{{ . | markdownify }}</h4>
  {{ end }}
</section>
