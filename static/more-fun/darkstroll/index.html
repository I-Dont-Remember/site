<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DARKSTROLL</title>
  <!-- Futuristic display font (easy drop-in) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;
      --fg:#f3f3f3;
      --muted:rgba(255,255,255,.72);
      --muted2:rgba(255,255,255,.55);
      --line:rgba(255,255,255,.26);
      --line2:rgba(255,255,255,.18);
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --glow: rgba(140, 210, 255, .26);
      --glow2: rgba(255,255,255,.18);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      letter-spacing:.01em;
    }

    /* HERO */
    .hero{
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:#0c0c0c;
      display:flex;
      flex-direction:column;
    }

    /* Background image applies ONLY to the hero body (below the navbar) */
    .heroBody{
      position:relative;
      flex:1;
      min-height: calc(100vh - 74px);
      overflow:hidden;
    }

    .heroBody::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        linear-gradient(180deg, rgba(0,0,0,.28) 0%, rgba(0,0,0,.46) 45%, rgba(0,0,0,.74) 100%),
        radial-gradient(1200px 700px at 50% 18%, rgba(255,255,255,.06), rgba(0,0,0,0) 55%),
        /* Replace this with your generated stroller image */
        url("./darkstroller.jpg") no-repeat;
      background-size:cover;
      background-position:center;
      filter:saturate(.98) contrast(1.06);
      transform:scale(1.02);
    }

    .topbar{
      position:relative;
      z-index:3;
      padding:18px 28px;
      display:flex;
      align-items:center;
      gap:18px;
      background:linear-gradient(180deg, rgba(0,0,0,.75), rgba(0,0,0,0));
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width: 240px;
    }

    /* Stylized logo text (approximate the screenshot feel) */
    .logo{
      font-size:22px;
      letter-spacing:.14em;
      text-transform:uppercase;
      line-height:1;
      position:relative;
      font-weight:800;
      user-select:none;
      font-family: "Orbitron", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      /* Edgier display treatment */
      -webkit-text-stroke: .7px rgba(255,255,255,.22);
      text-shadow:
        0 0 1px rgba(255,255,255,.35),
        0 10px 40px rgba(0,0,0,.6),
        0 0 22px var(--glow);
    }

    /* faux “cut” segments */
    .logo span{
      position:relative;
      display:inline-block;
      padding:0 2px;
    }
    .logo span::after{
      content:"";
      position:absolute;
      left:-1px;
      right:-1px;
      top:52%;
      height:2px;
      /* Slightly brighter cut for the "edgy" look */
      background:rgba(0,0,0,.62);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.10),
        0 0 18px rgba(140,210,255,.10);
      transform:skewX(-22deg);
      opacity:.92;
      pointer-events:none;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:26px;
      flex:1;
    }

    .nav a{
      color:rgba(255,255,255,.82);
      text-decoration:none;
      font-size:13px;
      letter-spacing:.14em;
      text-transform:uppercase;
      padding:8px 4px;
      position:relative;
    }
    .nav a:hover{color:rgba(255,255,255,.98)}
    .nav a::after{
      content:"";
      position:absolute;
      left:4px;
      right:4px;
      bottom:2px;
      height:1px;
      background:rgba(255,255,255,.26);
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .22s ease;
    }
    .nav a:hover::after{transform:scaleX(1)}

    .nav .right{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:18px;
    }

    .hamburger{
      width:40px;
      height:40px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      color:rgba(255,255,255,.86);
      border-radius:8px;
      cursor:pointer;
      padding:0;
    }
    .hamburger:hover{background:rgba(0,0,0,.28)}

    /* Mobile menu */
    .mobile{
      display:none;
      position:absolute;
      top:70px;
      right:18px;
      width:min(360px, calc(100vw - 36px));
      background:rgba(12,12,12,.92);
      border:1px solid rgba(255,255,255,.14);
      border-radius:14px;
      backdrop-filter: blur(10px);
      box-shadow:var(--shadow);
      padding:10px;
      z-index:5;
    }
    .mobile a{
      display:block;
      padding:12px 12px;
      border-radius:10px;
      color:rgba(255,255,255,.86);
      text-decoration:none;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:12px;
    }
    .mobile a:hover{background:rgba(255,255,255,.06)}

    .content{
      position:relative;
      z-index:2;
      min-height: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 126px 22px 75px;
    }

    .center{
      width:min(940px, 92vw);
      text-align:center;
      transform: translateY(-10px);
    }

    .title{
      margin:0;
      /* Smaller + slightly tighter so it doesn't dominate horizontally */
      font-size: clamp(46px, 10vw, 102px);
      letter-spacing: .05em;
      text-transform: uppercase;
      font-weight:800;
      font-family: "Orbitron", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;

      /* Edgier, more futuristic */
      -webkit-text-stroke: 1px rgba(255,255,255,.22);
      text-shadow:
        0 0 1px rgba(255,255,255,.85),
        0 0 26px var(--glow),
        0 18px 60px rgba(0,0,0,.62);

      /* Subtle metallic sheen */
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.78));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle{
      margin: 10px auto 28px;
      max-width: 780px;
      font-size: 16px;
      color: var(--muted);
      letter-spacing: .02em;
    }

        .cta{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
      margin-top: 18px;
    }

    .btn{
      width:min(780px, 92vw);
      height:58px;
      border-radius: 4px;
      border: 2px solid white;
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,.86);
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      box-shadow: 0 12px 36px rgba(0,0,0,.35);
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.42);
      background: rgba(0,0,0,.36);
      color: rgba(255,255,255,.96);
    }

    /* Footer row */
    .footer{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding: 18px 28px 22px;
      z-index:3;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.72));
      color: rgba(255,255,255,.75);
      flex-wrap:wrap;
    }

    .foot-item{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:13px;
      letter-spacing:.02em;
      color: rgba(255,255,255,.72);
    }

    .foot-item a{color:rgba(255,255,255,.72); text-decoration:none}
    .foot-item a:hover{color:rgba(255,255,255,.92)}

    .link-item{
      letter-spacing:.02em;
      color: rgba(255,255,255,.72);
    }
    .link-item a{color:rgba(255,255,255,.72); text-decoration:none}
    .link-item a:hover{color:rgba(255,255,255,.92)}


    .icon{
      width:18px;
      height:18px;
      display:inline-block;
      opacity:.9;
    }

    /* Responsive */
    @media (max-width: 980px){
      .brand{min-width:auto}
      .nav a{display:none}
      .nav .right{margin-left:auto}
    }

    @media (max-width: 520px){
      .topbar{padding:16px 16px}
      .footer{padding: 16px 16px 18px}
      .logo{font-size:22px}
      .title{letter-spacing:.05em}
      .btn{height:54px}
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce){
      .btn, .nav a::after{transition:none}
    }
  </style>
</head>
<body>
  <main class="hero" id="top">
    <header class="topbar">
      <div class="brand" aria-label="DARKSTROLL">
        <div class="logo" aria-hidden="true">
          <!-- Split into spans to fake the segmented logo look -->
          <span>D</span><span>A</span><span>R</span><span>K</span><span>S</span><span>T</span><span>R</span><span>O</span><span>L</span><span>L</span>
        </div>
      </div>

      <nav class="nav" aria-label="Primary">

          <button class="hamburger" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="mobileMenu">

            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

        <a href="#courses">Courses</a>

        <a href="#careers">Careers</a>
        <a href="#updates">Updates</a>
      </div>
    </header>

    <div class="heroBody" aria-label="Hero body">
      <section class="content" aria-label="Hero">

        <h1 class="title">DARKSTROLL</h1>

        <div class="cta" aria-label="Primary actions">

      </div>
    </section>

      <footer class="footer" aria-label="Footer">

        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

          <path d="M8.3 6.6l2.2-1.1c.7-.3 1.5-.1 2 .5l1.3 1.7c.4.6.4 1.4-.1 2l-1.1 1.3c-.3.4-.4 1-.2 1.4.6 1.4 1.7 2.6 3.2 3.2.5.2 1 .1 1.4-.2l1.3-1.1c.6-.5 1.4-.5 2-.1l1.7 1.3c.6.5.8 1.3.5 2l-1.1 2.2c-.4.8-1.3 1.2-2.2 1-7.1-1.6-12.6-7.1-14.2-14.2-.2-.9.2-1.8 1-2.2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <a href="tel:+16086169409">(608) 616-9409</a>
      </div>

      <div class="foot-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="2"/>
          <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <a href="mailto:info@darkstroll.com">info@darkstroll.com</a>
      </div>

      <div class="foot-item" style="gap:16px">
        <a href="#" aria-label="Instagram" title="Instagram">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Z" stroke="currentColor" stroke-width="2"/>

    </div>
  </main>

  <script>
    (function(){
      const btn = document.getElementById('menuBtn');
      const menu = document.getElementById('mobileMenu');

      function close(){
        menu.style.display = 'none';
        btn.setAttribute('aria-expanded','false');
      }

      btn.addEventListener('click', () => {
        const open = menu.style.display === 'block';
        menu.style.display = open ? 'none' : 'block';
        btn.setAttribute('aria-expanded', open ? 'false' : 'true');
      });

      // Close on outside click
      document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && !btn.contains(e.target)) close();
      });

      // Close on escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') close();
      });

      // Close after selecting a menu item
      menu.querySelectorAll('a').forEach(a => a.addEventListener('click', close));
    })();
  </script>
</body>
</html>
